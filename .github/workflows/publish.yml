name: publish
on:
  pull_request:
    types: [closed]
    branches:
      - main
      - next
      - beta
      - alpha
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: CFDI dependencies
        id: cfdi
        uses: ./.github/actions/cfdi
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js for Trusted Publishing
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.base_ref }}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: rush build

      - name: Publish (main)
        if: steps.branch.outputs.is_main == 'true'
        run: |
          SCOPES='${{ steps.cfdi.outputs.scopes }}'
          TOTAL=$(echo "$SCOPES" | jq -r '.[]' | wc -l | tr -d ' ')
          PUBLISHED=0
          FAILED_COUNT=0
          FAILED=""
          for scope in $(echo "$SCOPES" | jq -r '.[]'); do
            echo "=== Publishing $scope ==="
            rush version --version-policy "$scope" --bump
            if rush publish -p -b main --version-policy "$scope" --include-all --set-access-level=public; then
              git add -A
              PUBLISHED=$((PUBLISHED + 1))
              echo "✓ $scope published"
            else
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED="$FAILED $scope"
              git checkout -- .
              echo "::warning::✗ $scope failed, reverted"
            fi
          done
          echo ""
          echo "========== PUBLISH SUMMARY =========="
          echo "Total scopes: $TOTAL"
          echo "Published:    $PUBLISHED"
          echo "Failed:       $FAILED_COUNT"
          if [ -n "$FAILED" ]; then
            echo "Failed list: $FAILED"
          fi
          echo "====================================="
          if [ -n "$FAILED" ]; then
            echo "::error::Failed scopes:$FAILED"
            exit 1
          fi

      - name: Publish (prerelease)
        if: steps.branch.outputs.is_main == 'false'
        run: |
          TAG="${{ steps.branch.outputs.name }}"
          SCOPES='${{ steps.cfdi.outputs.scopes }}'
          TOTAL=$(echo "$SCOPES" | jq -r '.[]' | wc -l | tr -d ' ')
          PUBLISHED=0
          FAILED_COUNT=0
          FAILED=""
          for scope in $(echo "$SCOPES" | jq -r '.[]'); do
            echo "=== Publishing $scope ==="
            rush version --version-policy "$scope" --bump --override-bump prerelease --override-prerelease-id "$TAG"
            if rush publish --publish --version-policy "$scope" --tag "$TAG" --include-all --set-access-level=public; then
              git add -A
              PUBLISHED=$((PUBLISHED + 1))
              echo "✓ $scope published"
            else
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED="$FAILED $scope"
              git checkout -- .
              echo "::warning::✗ $scope failed, reverted"
            fi
          done
          echo ""
          echo "========== PUBLISH SUMMARY =========="
          echo "Total scopes: $TOTAL"
          echo "Published:    $PUBLISHED"
          echo "Failed:       $FAILED_COUNT"
          if [ -n "$FAILED" ]; then
            echo "Failed list: $FAILED"
          fi
          echo "====================================="
          if [ -n "$FAILED" ]; then
            echo "::error::Failed scopes:$FAILED"
            exit 1
          fi

      - name: Commit version bumps
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git add -A
          if [ -n "$(git diff --cached --name-only)" ]; then
            if [ "$BRANCH" = "main" ]; then
              git commit -m "chore: release $(date +%Y-%m-%d)"
            else
              git commit -m "chore: prerelease $BRANCH $(date +%Y-%m-%d)"
            fi
            git push origin $BRANCH
          else
            echo "No changes to commit"
          fi

      - name: Create GitHub Releases
        run: node common/scripts/github-release.js
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
