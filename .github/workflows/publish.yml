name: publish
on:
  pull_request:
    types: [closed]
    branches:
      - main
      - next
      - beta
      - alpha
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: CFDI dependencies
        uses: ./.github/actions/cfdi
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.base_ref }}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build
        run: rush build

      - name: Publish (main)
        if: steps.branch.outputs.is_main == 'true'
        run: node common/scripts/npm-publish.js

      - name: Publish (prerelease)
        if: steps.branch.outputs.is_main == 'false'
        run: node common/scripts/npm-publish.js --tag ${{ steps.branch.outputs.name }}

      - name: Commit version bumps
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git add -A
          if [ "$BRANCH" = "main" ]; then
            git commit -m "chore: release $(date +%Y-%m-%d)" || echo "No changes to commit"
          else
            git commit -m "chore: prerelease $BRANCH $(date +%Y-%m-%d)" || echo "No changes to commit"
          fi
          git push origin $BRANCH

      - name: Create GitHub Releases
        run: node common/scripts/github-release.js
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
