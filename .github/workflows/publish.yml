name: publish
on:
  pull_request:
    types: [closed]
    branches:
      - main
      - next
      - beta
      - alpha
      - dev

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rush
        run: npm install -g @microsoft/rush@5.169.2

      - name: Rush Update
        run: rush update

      - name: Configure git
        run: |
          git config user.name MisaelMa
          git config user.email amisael.amir.misael@gmail.com

      - name: Determine branch
        id: branch
        run: |
          BRANCH="${{ github.base_ref }}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$BRANCH" = "main" ]; then
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Version bump
        uses: actions/github-script@v7
        with:
          debug: true
          script: |
            const script = require('./common/scripts/github-actions.js')
            await script({github, context, core})

      - name: Get npm token via OIDC
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" | jq -r '.value')
          NPM_TOKEN=$(curl -sS -X POST "https://registry.npmjs.org/-/npm/v1/security/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}" | jq -r '.token')
          echo "::add-mask::$NPM_TOKEN"
          echo "NPM_AUTH_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV

      - name: Publish (main)
        if: steps.branch.outputs.is_main == 'true'
        run: rush publish --publish --target-branch main --include-all --set-access-level=public

      - name: Publish (prerelease)
        if: steps.branch.outputs.is_main == 'false'
        run: rush publish --publish --tag ${{ steps.branch.outputs.name }} --include-all --set-access-level=public --apply

      - name: Commit version bumps
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git add -A
          if [ "$BRANCH" = "main" ]; then
            git commit -m "chore: release $(date +%Y-%m-%d)" || echo "No changes to commit"
          else
            git commit -m "chore: prerelease $BRANCH $(date +%Y-%m-%d)" || echo "No changes to commit"
          fi
          git push origin $BRANCH

      - name: Create GitHub Releases
        run: node common/scripts/github-release.js
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
